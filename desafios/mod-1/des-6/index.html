<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <P>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá ultilizar cada caso</P>

    <ul type="square">
        <li><p><abbr title="Parágrafo">Parágrafo</abbr></p></li>
        <li><p><abbr title="Título">Título</abbr></p></li>
        <li><p><abbr title="Imagens">Imagens</abbr></p></li>
        <li><p><abbr title="Abreviações">Abreviações</abbr></p></li>
        <li><p><abbr title="Códigos-fonte">Códigos-fonte</abbr></p></li>
        <li><p><abbr title="listas Numeradas">listas Numeradas</abbr></p></li>
        <li><p><abbr title="listas com demarcadores">listas com demarcadores</abbr></p></li>
    </ul>
</body>
</html>
